# =============================================================================
# infra.conf — declaration de l'infrastructure VOULUE (verifiee au first-boot).
#
# Le first-boot compare cette declaration a la realite (zpool, zfs get, lsblk,
# firmware present) et genere une empreinte de conformite. Il NE decouvre rien
# tout seul : c'est TOI qui declares ici ce que le systeme doit avoir. Pour
# adapter le logiciel a une autre machine, il suffit d'editer ce fichier.
#
# Criticite (par section, surchargeable par cle) :
#   critical = true  -> un ecart STOPPE le first-boot (rapport + arret)
#   critical = false -> un ecart est un WARNING (consigne, on continue)
# =============================================================================

# Nom de la machine/profil (pour le rapport et l'empreinte)
profile = gentoo-stream-i5-11400

[pools]
# Chaque pool : type attendu + redondance attendue (nb de disques tolerables).
# Manquant = critique (sans pool, rien ne boote).
critical = true

    [[fast_pool]]
    type = stripe
    redundancy = 0        # stripe = AUCUNE redondance (perte 1 NVMe = pool perdu)

    [[boot_pool]]
    type = mirror
    redundancy = 4        # mirror 5 disques SATA

    [[data_pool]]
    type = raidz2
    redundancy = 2

[datasets]
# Chaque dataset : presence + proprietes ZFS attendues. Les datasets du chemin
# de BOOT sont critiques ; les annexes sont des warnings.

    [[fast_pool/sfs]]
    critical = true
    compression = off
    recordsize = 1M

    [[fast_pool/rootfs]]
    critical = true
    xattr = sa
    acltype = posixacl

    [[fast_pool/var]]
    critical = true
    xattr = sa
    acltype = posixacl

    [[fast_pool/log]]
    critical = false
    compression = zstd

    [[fast_pool/usr-src]]
    critical = false
    atime = off

    [[boot_pool/images]]
    critical = true
    compression = off

    [[boot_pool/manager]]
    critical = false

    [[boot_pool/efi-backup]]
    critical = false

    [[data_pool/log]]
    critical = false
    compression = zstd

    [[data_pool/home]]
    critical = false

    [[data_pool/archives]]
    critical = false

[efi]
# Partitions FAT (ESP). Au moins une doit etre presente et de type vfat.
critical = true
partitions = /dev/nvme0n1p1, /dev/nvme1n1p1
fstype = vfat

[firmware]
# Blobs attendus dans /lib/firmware (motifs glob acceptes). NIC = critique
# (pas de reseau sinon) ; GPU = warning (le boot console marche sans).

    [[required]]
    critical = true
    patterns = rtl_nic/rtl8125b-1.fw, rtl_nic/rtl8125b-2.fw

    [[optional]]
    critical = false
    patterns = i915/tgl_guc*, i915/tgl_huc*, i915/rkl_dmc*

[inference]
# Deux roles distincts, configurables separement :
#   - copilot : marquage AMONT optionnel (GitHub/Copilot), bypassable. Sert au
#     premier tri/etiquetage des idees. JAMAIS requis ; le local peut tout faire.
#   - local   : dispatch REEL (OpenVINO/Ollama sur la machine). C'est lui qui
#     fait le vrai travail d'inference. FORCE off en chroot (modele inactif).

    [[copilot]]
    enabled = false              # marquage amont optionnel ; off = on s'en passe
    role = upstream-tagging      # tri/etiquetage initial, non decisionnel
    # (pas d'endpoint local : c'est GitHub/Copilot cote board)

    [[local]]
    enabled = false              # FORCE false en chroot ; true en systeme boote
    role = dispatch              # inference reelle, decisionnelle
    backend = openvino           # openvino | ollama | stub
    endpoint = http://127.0.0.1:11434/v1
    model = qwen3:30b
    router_model = models/qwen2.5-0.5b-instruct-ov
