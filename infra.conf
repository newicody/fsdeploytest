# =============================================================================
# infra.conf — declaration de l'infrastructure VOULUE (verifiee au first-boot).
#
# Le first-boot compare cette declaration a la realite (zpool, zfs get, lsblk,
# firmware present) et genere une empreinte de conformite. Il NE decouvre rien
# tout seul : c'est TOI qui declares ici ce que le systeme doit avoir. Pour
# adapter le logiciel a une autre machine, il suffit d'editer ce fichier.
#
# Criticite (par section, surchargeable par cle) :
#   critical = true  -> un ecart STOPPE le first-boot (rapport + arret)
#   critical = false -> un ecart est un WARNING (consigne, on continue)
# =============================================================================

# Nom de la machine/profil (pour le rapport et l'empreinte)
profile = gentoo-stream-i5-11400

[pools]
# Chaque pool : type attendu + redondance attendue (nb de disques tolerables).
# Manquant = critique (sans pool, rien ne boote).
critical = true

    [[fast_pool]]
    type = stripe
    redundancy = 0        # stripe = AUCUNE redondance (perte 1 NVMe = pool perdu)

    [[boot_pool]]
    type = mirror
    redundancy = 4        # mirror 5 disques SATA

    [[data_pool]]
    type = raidz2
    redundancy = 2

[datasets]
# Chaque dataset : presence + proprietes ZFS attendues. Les datasets du chemin
# de BOOT sont critiques ; les annexes sont des warnings.

    [[fast_pool/sfs]]
    critical = true
    compression = off
    recordsize = 1M

    [[fast_pool/staging]]
    # staging de compilation/squashfs (meme pool que sfs -> os.replace atomique,
    # pas de cross-device). Sert si la destination manque de place. Non critique.
    critical = false
    compression = off

    [[fast_pool/rootfs]]
    critical = true
    xattr = sa
    acltype = posixacl

    # /var reste dans l'overlay rootfs (PAS un dataset). Seul /var/log est
    # persistant (journaux), monte par-dessus l'overlay.
    [[fast_pool/log]]
    critical = false
    compression = zstd

    [[fast_pool/usr-src]]
    critical = false
    atime = off

    [[boot_pool/images]]
    critical = true
    compression = off

    [[boot_pool/manager]]
    critical = false

    [[boot_pool/efi-backup]]
    critical = false

    [[data_pool/log]]
    critical = false
    compression = zstd

    [[data_pool/home]]
    # donnees utilisateur DURABLES : monte sur /home au boot (init.py respecte
    # le mountpoint ZFS). Contient /home/<user>/.autoboot/{rag,brainstorm}.
    mountpoint = /home
    critical = false

    [[data_pool/modeles]]
    # modeles de langage (OpenVINO/Ollama) : gros, lecture seule, durables.
    # monte sur /var/lib/models ; [inference] models_dir pointe ici.
    mountpoint = /var/lib/models
    critical = false

    [[data_pool/archives]]
    critical = false

[kernel]
# Options de compilation du noyau (lues par kernel_build.py ; les env-vars
# JOBS/CMDLINE/SRC restent prioritaires si definies, pour un override ponctuel).
src = /usr/src/linux
jobs = 13                       # make -jN (i5-11400 = 6c/12t -> 13 raisonnable)
# flags make supplementaires (optionnel), ex: LLVM=1 pour clang, V=1 verbose
make_flags =                    # ex: LLVM=1
# cmdline par defaut des entrees EFI classiques (les profils UKI ont la leur)
cmdline = pcie_aspm=off i915.force_probe=!4c8b xe.force_probe=4c8b ip=192.168.1.10::192.168.1.1:255.255.255.0::eth0:off:8.8.8.8 console=tty0 loglevel=4

[efi]
# Partitions FAT (ESP). PRINCIPE : on distingue le point de montage D'INSTALLATION
# (echafaudage, ou on copie les fichiers depuis le chroot/USB) de l'IDENTITE
# FINALE (PARTUUID, stable, qui sert a creer l'entree EFI independamment du point
# de montage). Une entree EFI reference une PARTITION + un chemin RELATIF a la
# racine de l'ESP (\EFI\gentoo\...), jamais un point de montage.
#
# install_mount par defaut /mnt/esp1, /mnt/esp2 : JAMAIS /boot/efi (qui peut
# contenir le /boot de Gentoo, sans rapport -> on n'empiete pas dessus).
critical = true
fstype = vfat

    [[esp1]]
    # identite finale (stable) -- nvme0n1p1 = EFI_SLAVE (cf. blkid)
    partuuid = 55687f49-9197-4390-9ac8-25c2318a1a55
    partition = /dev/nvme0n1p1       # repli si partuuid vide (moins stable)
    # echafaudage d'installation (ou monter pour copier les fichiers)
    install_mount = /mnt/esp1
    # role
    primary = true                   # ESP principale (entree EFI nommee + BootNext)
    register_uefi = true
    tag = nvme0                      # suffixe de label pour distinguer les entrees (ex Gentoo-safe-nvme0)

    [[esp2]]
    # nvme1n1p1 = EFI_MASTER (cf. blkid)
    partuuid = a9b24ae3-c3d6-405b-a405-203834dbb6d7
    partition = /dev/nvme1n1p1
    install_mount = /mnt/esp2
    primary = false                  # 2e disque bootable de maniere autonome
    register_uefi = true             # ON : on cree AUSSI les entrees sur ce disque
    tag = nvme1                      # suffixe distinct (ex Gentoo-safe-nvme1)

[firmware]
# Blobs attendus dans /lib/firmware (motifs glob acceptes). NIC = critique
# (pas de reseau sinon) ; GPU = warning (le boot console marche sans).

    [[required]]
    critical = true
    patterns = rtl_nic/rtl8125b-1.fw, rtl_nic/rtl8125b-2.fw

    [[optional]]
    critical = false
    patterns = i915/tgl_guc*, i915/tgl_huc*, i915/rkl_dmc*

[git]
# Board GitHub : ou remonter idees/rapports/echecs. Surchargeable par CLI
# (--repo, --owner, --number). Le token vient de l'env GITHUB_TOKEN (jamais ici).
repo = newicody/gentoo-stream      # owner/nom pour les Issues (mode issues)
mode = project                     # issues | project
project_owner = newicody           # proprietaire du Project v2 (mode project)
project_number = 1                 # numero du Project v2

[manager]
# Racine unique du "manager" : index des noyaux (manifest.json), journal
# append-only (history.jsonl), archives .config. Sur boot_pool (durable, hors
# fast_pool volatil). kernel_registry lit MANAGER_ROOT (env) sinon ce 'root' ;
# first_boot exporte MANAGER_ROOT depuis ici pour que TOUT (registre, rapport
# first-boot, journal) pointe au meme endroit. operate journalise au meme root.
root = /boot_pool/manager

[replication]
# Replication incrementale (zfs send -i) des datasets du stripe fast_pool (SANS
# redondance) vers data_pool (raidz2, durable). Lance par zfs_replicate.py
# (cron/timer ou manuel). keep = nombre de snapshots conserves de chaque cote.

    [[logs]]
    src = fast_pool/log
    dst = data_pool/log
    keep = 14

    [[sfs]]
    # synchro LENTE durable des images sfs (fast_pool stripe SANS redondance ->
    # data_pool raidz2). zfs_replicate fait 'zfs send | zfs recv -F' SANS -p :
    # le dst HERITE le mountpoint du parent (/data_pool/archives/sfs), donc PAS
    # de collision avec /fast_pool/sfs. Si le dst existant porte encore
    # mountpoint=/fast_pool/sfs (ancienne copie manuelle faite avec send -R/-p) :
    #   zfs inherit mountpoint data_pool/archives/sfs      # a faire UNE fois
    src = fast_pool/sfs
    dst = data_pool/archives/sfs
    keep = 2                # images volumineuses : on garde peu de snapshots

[uki]
# UKI (Unified Kernel Image) : un binaire EFI unique par profil, bundlant
# vmlinuz + initramfs + cmdline via objcopy (CONFIG_EFI_STUB=y -> le vmlinuz
# EST le stub, AUCUNE dependance systemd). Chaque profil produit 1 UKI place
# sur les 2 ESP ; register_uefi=true cree l'entree efibootmgr ; fallback=true
# ecrit aussi \EFI\BOOT\BOOTX64.EFI (bootable sans NVRAM, secours autonome).
# Secure Boot DESACTIVE pour l'instant (UKI non signes).
#
# La cmdline est dans l'ini : ajoute/retire ici les options qui peuvent faire
# planter (ex: un profil 'safe' avec nomodeset pour diagnostiquer).
enabled = true
# BootNext (essai unique au prochain demarrage) : utile pour VALIDER auto un
# nouveau noyau. En phase DEBUG, mets false -> aucun automatisme, tu choisis
# librement le profil dans le menu BIOS (evite qu'un profil force un boot alors
# que tu veux en tester un autre).
arm_bootnext = false
# Profil place en TETE du BootOrder (boot par defaut si tu ne touches a rien).
# Choisis le plus SUR pour demarrer (safe/debug). Vide = ne pas toucher au BootOrder.
default_profile = safe

    [[normal]]
    label = Gentoo
    cmdline = pcie_aspm=off i915.force_probe=!4c8b xe.force_probe=4c8b ip=192.168.1.10::192.168.1.1:255.255.255.0::eth0:off:8.8.8.8 console=tty0 loglevel=4
    register_uefi = true
    fallback = true        # ce profil sert aussi de \EFI\BOOT\BOOTX64.EFI

    [[safe]]
    label = Gentoo-safe
    cmdline = pcie_aspm=off nomodeset ip=192.168.1.10::192.168.1.1:255.255.255.0::eth0:off:8.8.8.8 console=tty0 loglevel=7
    register_uefi = true
    fallback = false       # profil de diagnostic (affichage VGA lisible)

    [[debug]]
    label = Gentoo-debug
    # 'debug' = init.py verbeux + pas de reboot au panic (ecran lisible).
    # ajoute 'break=zfs' (ou pseudofs|overlay|switch|launcher) pour un shell.
    # AFFICHAGE MAXIMAL (anti-ecran-noir) : earlyprintk=efi,keep affiche tres tot
    # via le framebuffer EFI ; keep_bootcon garde la console de boot active ;
    # nomodeset evite que le pilote GPU eteigne l'ecran. panic=0 = pas de reboot.
    cmdline = pcie_aspm=off nomodeset earlyprintk=efi,keep keep_bootcon debug ignore_loglevel panic=0 ip=192.168.1.10::192.168.1.1:255.255.255.0::eth0:off:8.8.8.8 console=tty0 loglevel=7
    register_uefi = true
    fallback = false

    [[i915only]]
    label = Gentoo-i915
    cmdline = pcie_aspm=off i915.force_probe=4c8b ip=192.168.1.10::192.168.1.1:255.255.255.0::eth0:off:8.8.8.8 console=tty0 loglevel=7
    register_uefi = true
    fallback = false

[inference]
# Deux roles distincts, configurables separement :
#   - copilot : marquage AMONT optionnel (GitHub/Copilot), bypassable. Sert au
#     premier tri/etiquetage des idees. JAMAIS requis ; le local peut tout faire.
#   - local   : dispatch REEL (OpenVINO/Ollama sur la machine). C'est lui qui
#     fait le vrai travail d'inference. FORCE off en chroot (modele inactif).

    # racine des modeles (data_pool/modeles monte ici). rag/brainstorm/ov
    # resolvent leurs modeles sous ce chemin (MODELS_DIR exporte par session).
    models_dir = /var/lib/models

    [[copilot]]
    enabled = false              # marquage amont optionnel ; off = on s'en passe
    role = upstream-tagging      # tri/etiquetage initial, non decisionnel
    # (pas d'endpoint local : c'est GitHub/Copilot cote board)

    [[local]]
    enabled = false              # FORCE false en chroot ; true en systeme boote
    role = dispatch              # inference reelle, decisionnelle
    backend = openvino           # openvino | ollama | stub
    endpoint = http://127.0.0.1:11434/v1
    model = qwen3:30b
    router_model = models/qwen2.5-0.5b-instruct-ov

# ============================================================================
# [services] : services OpenRC que session_launch.py demarre APRES switch_root,
# via 'rc-service <nom> start'. L'ORDRE des lignes = ordre de demarrage (configobj
# preserve l'ordre). Format de chaque valeur : 'enabled' ou 'disabled', suivi
# d'options separees par des virgules :
#   enabled            -> demarre le service (rc-service <nom> start)
#   disabled           -> ne demarre PAS (laisse, ou a 'rc-update del' une fois)
#   ,required          -> si le demarrage echoue, on le SIGNALE fort (mais on ne
#                         bloque pas le boot : PID 1 doit vivre)
# Le RESEAU et ZFS ne sont PAS ici : deja geres par l'initramfs / init.py.
# ============================================================================
[services]
    # --- SOCLE (demarre AVANT le stream : logs + bus + /dev complet) ---------
    syslog-ng = enabled, required    # logs systeme (restaure /var/log)
    dbus      = enabled, required    # bus systeme (Firefox, portails, elogind)
    udev      = enabled, required    # peuple /dev (GPU /dev/dri, etc.)

    # --- horloge (recommande : TLS/RTMP YouTube exigent une heure juste) ------
    chronyd   = disabled             # passe a 'enabled' si l'heure derive

    # --- secondaires (apres le stream, ou a la demande) ----------------------
    sshd      = disabled             # acces distant debug
    ollama    = disabled             # inference locale (active quand pret)

    # --- services A NE PAS lancer (appliance : pas de DM, pas de mail, etc.) --
    # display-manager / xdm : cage est lance par session_launch, pas de DM
    # NetworkManager / dhcpcd / wpa_supplicant : reseau deja en initramfs
    # fail2ban / nullmailer / rsyncd / git-daemon / cronie / auditd : inutiles

# ============================================================================
# [storage] : politique de stockage. Placement = redondance x volume x vitesse.
#   fast_pool  = NVMe STRIPE (rapide, ZERO redondance) -> ephemere/reconstructible
#   data_pool  = raidz2 SATA (gros, lent, tres redondant) -> precieux/volumineux
#   boot_pool  = mirror SATA (petit, redondant) -> critique de boot + manager
# storage_manager.py LIT cette section, VERIFIE l'etat reel (zfs) et RAPPORTE les
# ecarts (il ne corrige PAS : tu appliques a la main les commandes suggerees).
# Format par dataset : pool, role, et proprietes attendues (vide = non verifie).
# ============================================================================
[storage]

    # --- fast_pool : ephemere / rapide / reconstructible ---------------------
    [[fast_pool/sfs]]
    pool = fast_pool
    role = images actives (rootfs-vN.sfs, modules) lues au boot
    compression = zstd
    canmount = on

    [[fast_pool/rootfs]]
    pool = fast_pool
    role = upper de l'overlay racine (systeme mutable)
    canmount = noauto            # reserve a l'overlay ; jamais monte auto

    [[fast_pool/staging]]
    pool = fast_pool
    role = staging de build (rootfs en construction, reconstructible)
    compression = zstd
    canmount = noauto

    [[fast_pool/usr-src]]
    pool = fast_pool
    role = sources noyau (compilation rapide ; .config sauvee dans manager)
    compression = zstd

    [[fast_pool/var]]
    pool = fast_pool
    role = var volatil systeme

    [[fast_pool/tmp]]
    pool = fast_pool
    role = tmp volatil

    [[fast_pool/log]]
    pool = fast_pool
    role = log courant (historique replique vers data_pool/log)

    [[fast_pool/reserve]]
    pool = fast_pool
    role = reserve d'espace (empeche le pool d'atteindre 100%)
    reservation = 200G           # reservation ZFS reelle attendue
    canmount = off

    # --- data_pool : precieux / volumineux / tres redondant ------------------
    [[data_pool/home]]
    pool = data_pool
    role = donnees utilisateur (precieux)
    compression = zstd

    [[data_pool/log]]
    pool = data_pool
    role = logs persistants / historique

    [[data_pool/archives]]
    pool = data_pool
    role = conteneur archives (copies lentes de snapshots)
    canmount = off

    [[data_pool/archives/gentoo]]
    pool = data_pool
    role = copie lente (zfs send/recv) des snapshots rootfs/upper

    [[data_pool/archives/failsafe]]
    pool = data_pool
    role = rootfs de secours archives

    # --- boot_pool : critique de boot / manager (petit, redondant) -----------
    [[boot_pool/images]]
    pool = boot_pool
    role = rootfs de secours (RESCUE_SFS : boot si fast_pool mort)

    [[boot_pool/efi-backup]]
    pool = boot_pool
    role = sauvegarde des ESP

    [[boot_pool/manager]]
    pool = boot_pool
    role = config + etat du gestionnaire (infra.conf ref, .config noyau sauvees, etat deploiements)
    compression = zstd

# ============================================================================
# [session] : session graphique lancee par session_launch.py apres le socle.
# Modele : un UTILISATEUR DEDIE non-root (plus sur que cage en root), membre des
# groupes video/input/seat (acces GPU/entrees via seatd). L'app principale est
# lancee dans cage (compositeur kiosk). Verrou d'ecran optionnel via swaylock
# (eprouve, PAM natif), avec une couche Python (python-pam) possible autour.
# ============================================================================
[session]
    # utilisateur de la session graphique (cree s'il manque, voir session_launch)
    user = eric
    # groupes requis pour Wayland/seatd (acces DRM + entrees + seat)
    groups = video, input, seat, render
    # application principale lancee dans cage. 'foot' (terminal) par defaut ;
    # peut etre 'firefox', un chemin, ou une commande avec arguments.
    app = foot
    # repli si l'app principale echoue (pour ne jamais avoir un cage vide)
    app_fallback = foot

    [[lock]]
    # verrou d'ecran (swaylock). enabled=false -> pas de verrouillage auto.
    enabled = false
    # delai d'inactivite avant verrouillage automatique (secondes). 0 = jamais.
    idle_timeout = 300
    # backend d'authentification : 'swaylock' (PAM natif) recommande.
    backend = swaylock
    # options swaylock (apparence). Le mot de passe est valide par PAM (compte user).
    options = --daemonize, --indicator-caps-lock, --color=1e1e2e

# ============================================================================
# [snapshots] : politique de retention par dataset, lue par snapshot_manager.py.
# Chaque dataset declare combien de snapshots GARDER (les plus recents) ; la
# rotation purge les plus anciens AU-DELA de ce nombre. Les snapshots sont
# classes par TYPE selon leur prefixe (apres '@') :
#   auto-    : crees par snapshot_manager (planifies/manuels)
#   freeze-  : crees par freeze_overlay.py (avant de figer un rootfs)
#   presfs-  : crees par init.py (avant reset d'un upper perime)
# 'keep' s'applique par (dataset, type) pour ne pas melanger les usages.
# 'replicate = data_pool/...' : ce dataset est aussi repliqué la-bas (zfs_replicate).
# ============================================================================
[snapshots]
    # prefixe utilise par snapshot_manager pour ses propres snapshots
    auto_prefix = auto

    [[fast_pool/sfs]]
    keep = 5                     # images : peu de snapshots (gros)

    [[fast_pool/rootfs]]
    keep = 10                    # upper : on garde plus d'historique
    # NB : les snapshots freeze-/presfs- de ce dataset sont aussi soumis a 'keep'
    # par type (10 freeze max, 10 presfs max), distinctement.

    [[fast_pool/log]]
    keep = 3
    replicate = data_pool/log    # repliqué vers data_pool (durable) via zfs_replicate

    [[data_pool/home]]
    keep = 14                    # donnees precieuses : 2 semaines si journalier

    [[boot_pool/manager]]
    keep = 10                    # configs/etat du gestionnaire
