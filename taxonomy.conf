# Taxonomie des modes metiers (configobj). Consommee par taxonomy.py / projects.py
# pour valider et router les artefacts. A affiner ; volontairement permissif (un
# label inconnu n'est pas rejete, il est signale).

# Axes transversaux communs a tous les modes.
[axes]
list = inventaire, veille, operations, etude, ressources, validation, diffusion

# Cycle de vie (kanban HUMAIN). 'machine_transitions' = les SEULES transitions de
# state que la machine a le droit de poser (idea -> explore : "j'ai traite, a toi").
# Tout le reste est pilote par l'humain.
[states]
list = idea, explore, dev, wip, prod, hold, drop
machine_transitions = idea:explore

[modes]

    [[garage]]
    entity = vehicule
    domains = vehicule, reparation, entretien, etude, budget, outillage, drones, consommables, atelier, diffusion

    [[kernel]]
    entity = noyau
    domains = veille, architecture, activite-devs, conseil, coherence-config, validation, tests, diffusion

    [[ideas]]
    entity = idee
    domains = capture, triage, relation, axe-recherche, promotion

    [[science]]
    entity = phenomene
    domains = thermique, fluides, fea, materiaux, electricite, physique, monte-carlo, evolutionnaire, modeles
